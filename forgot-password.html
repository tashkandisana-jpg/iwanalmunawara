<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Iwan Al-Madinah</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="public/css/forgot.css">
</head>

<body>
    
<a href="index.html" class="back-home-btn"
   data-text-ar="← العودة للصفحة الرئيسية"
   data-text-en="Back to Home →">
    Back to Home →
</a>

<div class="forgot-container">

    <!-- Language Switch -->
    <div class="lang-switch-login text-end mb-3">
        <button class="btn btn-sm btn-outline-light me-1" id="btn-ar-login">AR</button>
        <button class="btn btn-sm btn-outline-light" id="btn-en-login">EN</button>
    </div>

    <div class="forgot-box">

        <!-- Logo -->
        <div class="text-center mb-4">
            <img src="public/img/company.png" class="forgot-logo" alt="Logo">
            <h3 class="forgot-title"
                data-text-ar="استرجاع كلمة المرور"
                data-text-en="Reset Password">
                Reset Password
            </h3>
        </div>

        <p class="forgot-text text-center mb-4"
           data-text-ar="أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة تعيين كلمة المرور."
           data-text-en="Enter your email and we will send you a password reset link.">
            Enter your email and we will send you a password reset link.
        </p>

        <form>
            <div class="mb-3">
                <label class="form-label"
                       data-text-ar="البريد الإلكتروني"
                       data-text-en="Email">Email</label>
                <input type="email" class="form-control" placeholder="example@gmail.com">
            </div>

            <button class="btn forgot-btn w-100"
                    data-text-ar="إرسال الرابط"
                    data-text-en="Send Reset Link">
                Send Reset Link
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="login.html" class="back-link"
               data-text-ar="العودة لتسجيل الدخول"
               data-text-en="Back to Login">
                Back to Login
            </a>
        </div>

    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="public/js/language.js"></script>

</body>
</html>
