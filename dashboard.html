<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الطلبات</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f0f0f;
            color: #fff;
        }
        .table-container {
            margin-top: 120px;
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        th, td {
            color: #fff;
        }
        .search-box {
            margin-bottom: 20px;
        }
        .logout-btn {
            position: fixed;
            top: 20px;
            left: 20px;
        }
    </style>
</head>

<body>

<!-- حماية لوحة الطلبات -->
<script>
    if (localStorage.getItem("loggedIn") !== "true") {
        window.location.href = "admin/login1.html";
    }
</script>

<button class="btn btn-danger logout-btn" onclick="logout()">تسجيل خروج</button>

<div class="container table-container">
    <h2 class="text-center mb-4">📋 لوحة الطلبات</h2>

    <input type="text" id="searchInput" class="form-control search-box" placeholder="ابحث بالاسم أو رقم الجوال">

    <table class="table table-dark table-hover text-center">
        <thead>
            <tr>
                <th>الاسم</th>
                <th>الجوال</th>
                <th>الإيميل</th>
                <th>نوع المشروع</th>
                <th>المساحة</th>
                <th>الموقع</th>
                <th>ملاحظات</th>
                <th>التاريخ</th>
            </tr>
        </thead>
        <tbody id="requestsTable"></tbody>
    </table>
</div>

<script>
    // جلب الطلبات من السيرفر
    fetch("http://localhost:3000/get-requests")
        .then(res => res.json())
        .then(data => {
            const table = document.getElementById("requestsTable");

            data.forEach(req => {
                const row = `
                    <tr>
                        <td>${req.fullName}</td>
                        <td>${req.phone}</td>
                        <td>${req.email}</td>
                        <td>${req.projectType}</td>
                        <td>${req.landArea}</td>
                        <td>${req.location}</td>
                        <td>${req.notes || "—"}</td>
                        <td>${new Date(req.created_at).toLocaleString()}</td>
                    </tr>
                `;
                table.innerHTML += row;
            });
        });

    // البحث داخل الجدول
    document.getElementById("searchInput").addEventListener("keyup", function() {
        const value = this.value.toLowerCase();
        const rows = document.querySelectorAll("#requestsTable tr");

        rows.forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(value) ? "" : "none";
        });
    });

    // تسجيل خروج
    function logout() {
        localStorage.removeItem("loggedIn");
        window.location.href = "admin/login1.html";
    }
</script>

</body>
</html>
