<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Iwan Al-Madinah</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="public/css/login.css">
</head>

<body>

<a href="index.html" class="back-home-btn"
   data-text-ar="← العودة للصفحة الرئيسية"
   data-text-en="Back to Home →">
    Back to Home →
</a>

<div class="login-container">

    <!-- Language Switch -->
    <div class="lang-switch-login text-end mb-3">
        <button class="btn btn-sm btn-outline-light me-1" id="btn-ar-login">AR</button>
        <button class="btn btn-sm btn-outline-light" id="btn-en-login">EN</button>
    </div>

    <div class="login-box">

        <!-- Logo -->
        <div class="text-center mb-4">
            <img src="public/img/company.png" class="login-logo" alt="Logo">
            <h3 class="login-title"
                data-text-ar="إيوان المنورة"
                data-text-en="Iwan Al-Madinah">
                Iwan Al-Madinah
            </h3>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-4" id="loginTabs">
            <li class="nav-item">
                <button class="nav-link active"
                        id="login-tab"
                        data-bs-toggle="tab"
                        data-bs-target="#login"
                        data-text-ar="تسجيل الدخول"
                        data-text-en="Login">
                    Login
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link"
                        id="signup-tab"
                        data-bs-toggle="tab"
                        data-bs-target="#signup"
                        data-text-ar="إنشاء حساب"
                        data-text-en="Create Account">
                    Create Account
                </button>
            </li>
        </ul>

        <div class="tab-content">

            <!-- LOGIN -->
            <div class="tab-pane fade show active" id="login">
                <form>
                    <div class="mb-3">
                        <label class="form-label"
                               data-text-ar="البريد الإلكتروني"
                               data-text-en="Email">Email</label>
                        <input type="email" class="form-control" placeholder="example@gmail.com">
                    </div>

                    <div class="mb-3">
                        <label class="form-label"
                               data-text-ar="كلمة المرور"
                               data-text-en="Password">Password</label>
                        <input type="password" class="form-control" placeholder="••••••••">
                    </div>

                    <button class="btn login-btn w-100"
                            data-text-ar="تسجيل الدخول"
                            data-text-en="Login">
                        Login
                    </button>

                    <div class="text-center mt-3">
                        <a href="forgot-password.html" class="forgot-link"
                           data-text-ar="نسيت كلمة المرور؟"
                           data-text-en="Forgot your password?">
                            Forgot your password?
                        </a>
                    </div>
                </form>
            </div>

            <!-- SIGN UP -->
            <div class="tab-pane fade" id="signup">
                <form>
                    <div class="mb-3">
                        <label class="form-label"
                               data-text-ar="الاسم الكامل"
                               data-text-en="Full Name">Full Name</label>
                        <input type="text" class="form-control" placeholder="Your name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label"
                               data-text-ar="البريد الإلكتروني"
                               data-text-en="Email">Email</label>
                        <input type="email" class="form-control" placeholder="example@gmail.com">
                    </div>

                    <div class="mb-3">
                        <label class="form-label"
                               data-text-ar="رقم الجوال"
                               data-text-en="Phone Number">Phone Number</label>
                        <input type="text" class="form-control" placeholder="05xxxxxxxx">
                    </div>

                    <div class="mb-3">
                        <label class="form-label"
                               data-text-ar="كلمة المرور"
                               data-text-en="Password">Password</label>
                        <input type="password" class="form-control" placeholder="••••••••">
                    </div>

                    <div class="mb-3">
                        <label class="form-label"
                               data-text-ar="تأكيد كلمة المرور"
                               data-text-en="Confirm Password">Confirm Password</label>
                        <input type="password" class="form-control" placeholder="••••••••">
                    </div>

                    <button class="btn login-btn w-100"
                            data-text-ar="إنشاء حساب"
                            data-text-en="Create Account">
                        Create Account
                    </button>
                </form>
            </div>

        </div>

    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="public/js/language.js"></script>

</body>
</html>
